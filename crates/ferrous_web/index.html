<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FerrousEngine Web - 3D Viewer</title>
    <style>
        :root {
            --accent: #4a9eff;
            --bg: #05080c;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #ferrous-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.4);
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #888;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>
    <div id="status">[Ferrous] Probando entorno WebGPU...</div>
    <div id="ferrous-container"></div>

    <div class="ui-overlay">
        <button id="create-terrain">Activar Herramienta Esculpido</button>
        <button id="toggle-sky">Cielo Procedural HDR</button>
    </div>

    <div
        style="position: absolute; bottom: 30px; right: 30px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; font-size: 13px; color: #aaa; border: 1px solid rgba(255,255,255,0.1); pointer-events: none;">
        <strong style="color: #fff;">Controles de Esculpido:</strong><br>
        • Click Izquierdo: Elevar Terreno<br>
        • Click Derecho: Bajar Terreno<br>
        • WASD: Mover Cámara<br>
        • Mouse: Rotar Cámara
    </div>

    <script type="module">
        import init, { FerrousWebEngine } from './pkg/ferrous_web.js';

        async function bootstrap() {
            const status = document.getElementById('status');

            try {
                // HACK SISTÉMICO: 
                // ya que no podemos habilitar la feature 'fetch' en web-sys del playground,
                // vamos a inyectar un polyfill manual en el motor.
                const wasmPath = './pkg/ferrous_web_bg.wasm';

                // Creamos un callback que provee fetch a cualquier import que lo pida
                const polyfillImports = {
                    'env': {},
                    './ferrous_web_bg.js': {}
                };

                // Si el motor pide fetch, se lo damos.
                // El hash ca19a9480623b9a8 es el que reportó el LinkError anteriormente.
                polyfillImports['./ferrous_web_bg.js']['__wbg_fetch_ca19a9480623b9a8'] = (arg1, arg2) => {
                    return fetch(arg1, arg2);
                };

                // Inicializamos con el hack
                await init(undefined, {
                    './ferrous_web_bg.js': polyfillImports['./ferrous_web_bg.js']
                });

                status.innerText = "[Ferrous] Motor iniciado correctamente.";

                const engine = new FerrousWebEngine();

                // Botones interactivos
                document.getElementById('create-terrain').onclick = () => {
                    engine.create_terrain();
                };

                document.getElementById('toggle-sky').onclick = () => {
                    engine.toggle_sky();
                };

                await engine.mount_and_run();

            } catch (e) {
                if (e.message && e.message.includes("control flow")) return;
                console.error("[Ferrous] Error crítico inicializando motor:", e);
                status.innerText = "[Ferrous] ERROR DE INICIALIZACIÓN: " + e.message;
                status.style.color = "red";
            }
        }

        // MutationObserver para depurar canvas
        const container = document.getElementById('ferrous-container');
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.addedNodes.length) {
                    const canvas = container.querySelector('canvas');
                    if (canvas) {
                        console.log(`[Ferrous] Canvas inyectado en DOM: ${canvas.width} x ${canvas.height}`);
                    }
                }
            });
        });
        observer.observe(container, { childList: true });

        bootstrap();
    </script>
</body>

</html>
